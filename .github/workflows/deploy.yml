name: Deploy PartyKit Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: |
          mkdir -p ~/.partykit
          echo '{"access_token":"${{ secrets.PARTYKIT_TOKEN }}","login":"kalakaritzu","type":"clerk","username":"kalakaritzu","team":"kalakaritzu"}' > ~/.partykit/config.json
          npx partykit deploy
